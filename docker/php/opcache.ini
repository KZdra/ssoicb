; ============================================================
; OPcache settings untuk PHP production performance
; ============================================================

opcache.enable = 1
opcache.enable_cli = 0

; Jumlah memory untuk menyimpan compiled scripts (MB)
opcache.memory_consumption = 128

; Jumlah memory untuk string interning (MB)
opcache.interned_strings_buffer = 16

; Max jumlah files yang bisa di-cache
opcache.max_accelerated_files = 20000

; Di production: matikan pengecekan perubahan file (lebih cepat)
; Set ke 1 jika ingin auto-reload saat file berubah (untuk staging)
opcache.validate_timestamps = 0

; Revalidation frequency (tidak relevan jika validate_timestamps=0)
opcache.revalidate_freq = 0

; Fast shutdown
opcache.fast_shutdown = 1

; Save komentar (diperlukan untuk anotasi/docblock)
opcache.save_comments = 1
