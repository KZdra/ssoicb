services:
  # ============================================================
  # Service: Aplikasi Laravel (ssoICB)
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Cache dari image sebelumnya untuk mempercepat build
      cache_from:
        - ssoicb_app:latest

    image: ssoicb_app:latest
    container_name: ssoicb_app

    restart: unless-stopped

    ports:
      - "8001:80"

    environment:
      # ---- App ----
      APP_NAME: "SSO ICB"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8001"

      # ---- Database ----
      # DB_HOST menggunakan nama container mysql3306 yang sudah ada
      # Pastikan container ini terhubung ke network yang sama (bridge_network)
      DB_CONNECTION: mysql
      DB_HOST: mysql3306
      DB_PORT: 3306
      DB_DATABASE: ssoicb
      DB_USERNAME: root
      DB_PASSWORD: ""

      # ---- Cache & Session (gunakan file agar tidak bergantung DB saat startup) ----
      CACHE_STORE: file
      SESSION_DRIVER: file
      SESSION_LIFETIME: "120"

      # ---- Queue ----
      QUEUE_CONNECTION: database

      # ---- Logging ----
      LOG_CHANNEL: stderr
      LOG_LEVEL: error

    volumes:
      # Mount storage untuk persistensi log, upload, dll
      - ssoicb_storage:/var/www/html/storage
      # Mount bootstrap/cache agar bisa ditulis saat runtime
      - ssoicb_bootstrap_cache:/var/www/html/bootstrap/cache

    networks:
      - bridge_network

    # Healthcheck: pastikan Apache merespons sebelum dianggap "healthy"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Logging best practice: batasi ukuran log container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    depends_on:
      - queue_worker

  # ============================================================
  # Service: Queue Worker (untuk QUEUE_CONNECTION=database)
  # ============================================================
  queue_worker:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - ssoicb_app:latest

    image: ssoicb_app:latest
    container_name: ssoicb_queue

    restart: unless-stopped

    # Override command: jalankan queue worker, bukan Apache
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]

    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "" # Akan diisi oleh entrypoint

      DB_CONNECTION: mysql
      DB_HOST: mysql3306
      DB_PORT: 3306
      DB_DATABASE: ssoicb
      DB_USERNAME: root
      DB_PASSWORD: ""

      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      LOG_LEVEL: error

    volumes:
      - ssoicb_storage:/var/www/html/storage
      - ssoicb_bootstrap_cache:/var/www/html/bootstrap/cache

    networks:
      - bridge_network

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ============================================================
# Volumes: Persistensi data
# ============================================================
volumes:
  ssoicb_storage:
    driver: local
  ssoicb_bootstrap_cache:
    driver: local

# ============================================================
# Networks: Terhubung ke network Docker bridge yang sudah ada
# (tempat container mysql3306 berjalan)
# ============================================================
networks:
  bridge_network:
    # Gunakan network eksternal yang sudah ada (tempat mysql3306 berjalan)
    external: true
    name: bridge
